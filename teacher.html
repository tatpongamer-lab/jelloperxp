<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบลงทะเบียนคุณครูภาคกลางคืน | แสดสัมพันธ์ ครั้งที่ 4 </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary-orange: #FF6600;
            --primary-blue: #003366;
            --bg-panel: #ffffff;
            --text-main: #333333;
            --border-color: #dee2e6;
            --border-radius: 12px;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Sarabun', sans-serif;
            color: var(--text-main);
        }
        .header-image {
            width: 100%;
            height: auto;
            border-bottom: 4px solid var(--primary-orange);
            /* เพิ่มความโค้งมนเล็กน้อยด้านล่างของรูปเพื่อความสวยงาม */
            border-radius: 0 0 16px 16px;
        }
        .card-custom {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .form-control, .form-select {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.2);
        }
        .btn-primary {
            background-color: var(--primary-orange);
            border: none;
            font-weight: bold;
            color: #fff;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background-color: #e65c00;
            color: #fff;
        }
        
        /* ================= ปุ่มกดแบบ Custom (Card Select) ================= */
        .btn-check-custom { display: none; }
        .btn-label-custom {
            border: 2px solid var(--border-color);
            background-color: #fff;
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease-in-out;
            flex: 1;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }
        .btn-label-custom:hover {
            border-color: #babbbc;
            background-color: #f8f9fa;
        }
        /* สถานะตอนถูกกด (Active) */
        .btn-check-custom:checked + .btn-label-custom {
            background-color: rgba(255, 102, 0, 0.05);
            border-color: var(--primary-orange);
            color: var(--primary-orange);
            font-weight: 600;
        }

        /* ================= รูปแบบบัตรเข้างาน ================= */
        .vip-ticket { background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); position: relative; max-width: 320px; margin: 0 auto; text-align: left; border: none; overflow: hidden; color: #000; }
        .vip-ticket-header { background: linear-gradient(135deg, var(--primary-orange), var(--primary-blue)); color: white; padding: 15px 15px 20px; text-align: center; position: relative; }
        .vip-ticket-header h4 { margin: 0; font-weight: 700; font-size: 1.25rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); font-family: 'Sarabun', sans-serif;}
        .vip-ticket-header .ticket-id { background: rgba(255,255,255,0.25); padding: 2px 12px; border-radius: 15px; display: inline-block; margin-top: 8px; font-size: 0.85rem; letter-spacing: 1px; font-family: 'Courier New', Courier, monospace; font-weight: bold; color: white; }
        .vip-ticket-body { padding: 20px 15px 15px; background: #fff; position: relative; }
        .vip-ticket-body::before, .vip-ticket-body::after { content: ''; position: absolute; top: -12px; width: 24px; height: 24px; background: #f8f9fa; border-radius: 50%; z-index: 2; box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); }
        .vip-ticket-body::before { left: -12px; }
        .vip-ticket-body::after { right: -12px; }
        .ticket-detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #e9ecef; padding-bottom: 6px; }
        .ticket-detail-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .ticket-detail-label { color: #6c757d; font-size: 0.85rem; font-weight: 600; }
        .ticket-detail-value { color: var(--primary-blue); font-weight: 700; font-size: 0.95rem; text-align: right; max-width: 75%; }
        .ticket-qr-section { background: #f8f9fa; margin: 15px -15px -15px -15px; padding: 15px; text-align: center; border-top: 2px dashed #dee2e6; }
        
        .page-title {
            color: var(--primary-blue);
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
            font-size: 1.5rem;
        }

        /* แก้ปัญหา In-app Browser ไม่สามารถเลือก Dropdown ได้ */
        select.form-select, select {
            -webkit-appearance: auto !important;
            appearance: auto !important;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container mx-auto pb-5" style="max-width: 400px;">
    <!-- Header Image -->
    <div id="topHeaderImage" style="text-align: center; margin-bottom: 20px;">
        <!-- ใส่ onerror ไว้เผื่อในกรณีที่รูปยังไม่ถูกสร้างจะได้ไม่เห็นเป็นกรอบรูปแตก -->
        <img src="image/teacher.jpg" alt="Teacher Header" class="header-image" onerror="this.style.display='none';">
    </div>

    <div id="mainFormSection">
        <form id="teacherForm" onsubmit="submitRegistration(event)">
        <!-- Section 1: ข้อมูลส่วนตัว -->
        <div class="card-custom">
            <h5 class="mb-3" style="color: var(--primary-blue);"> ข้อมูลส่วนตัว</h5>
            <div class="row g-3">
                <div class="col-6">
                    <input type="text" id="fName" class="form-control" placeholder="ชื่อ(เว้นคำนำหน้า)" required>
                </div>
                <div class="col-6">
                    <input type="text" id="lName" class="form-control" placeholder="นามสกุล" required>
                </div>
            </div>
        </div>

        <!-- Section 2: ข้อมูลการติดต่อ -->
        <div class="card-custom">
            <h5 class="mb-3" style="color: var(--primary-blue);">ข้อมูลการติดต่อ</h5>
            <div class="row">
                <div class="col-12">
                    <input type="tel" id="phone" class="form-control" placeholder="เบอร์โทรศัพท์ (10 หลัก)" pattern="0[0-9]{9}" required>
                </div>
            </div>
        </div>

        <!-- Section 4 (3): ประเภทอาหาร -->
        <div class="card-custom">
            <h5 class="mb-3" style="color: var(--primary-blue);">ประเภทอาหาร</h5>
            <div class="d-flex gap-2">
                <input type="radio" name="foodMode" id="foodBuddhist" value="BUDDHIST" class="btn-check-custom" checked>
                <label class="btn-label-custom" for="foodBuddhist">ไทยพุทธ</label>
                
                <input type="radio" name="foodMode" id="foodHalal" value="HALAL" class="btn-check-custom">
                <label class="btn-label-custom" for="foodHalal">ไทยมุสลิม</label>
            </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn btn-primary w-100 py-3 fs-5 shadow-sm mt-3">
            <i class="bi bi-check-circle-fill"></i> ยืนยันการลงทะเบียน
        </button>
        <a href="https://www.facebook.com/KhaesadNST" target="_blank" style="
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            padding: 16px 0; 
            margin: 16px auto 0 auto; 
            text-decoration: none; 
            width: 100%; 
            max-width: 400px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        ">
            <!-- ส่วนคำว่า "ติดต่อ :" เปลี่ยนสีเป็น var(--primary-orange) -->
            <span style="color: var(--primary-orange, #FF6600); font-weight: 500; font-size: 1.2rem; white-space: nowrap;">
                ติดต่อ :
            </span>
            
            <!-- ส่วนไอคอน Facebook -->
            <i class="bi bi-facebook" style="font-size: 1.3rem; color: var(--primary-blue, #003366); flex-shrink: 0;"></i> 
            
            <!-- ส่วนชื่อเพจ -->
            <span style="color: var(--primary-blue, #003366); font-weight: 500; font-size: 1rem; line-height: 1.4;">
                แคแสดสัมพันธ์ ครั้งที่ 4 ปี 2569
            </span>
        </a>
    </form>
    </div> <!-- /mainFormSection -->
</div> <!-- /container -->

<!-- ================= ส่วนแสดงตั๋ว (E-Ticket) ================= -->
<div class="container pb-5 mx-auto" id="ticketSection" style="max-width: 400px; display: none; text-align: center;">
    
    <h3 class="page-title mt-4">บัตรเข้างานของคุณ</h3>

    <div class="vip-ticket mx-auto" id="ticketContent">
        <div class="vip-ticket-header">
            <h4>แคแสดสัมพันธ์ ครั้งที่ 4</h4>
            <div id="t_batch" style="font-size: 0.9rem; margin-top: 5px; opacity: 0.9;">(อาจารย์)</div>
            <div class="ticket-id">ID: <span id="t_id"></span></div>
        </div>
        
        <div class="vip-ticket-body">
            <div class="ticket-detail-row">
                <span class="ticket-detail-label">ชื่อ</span>
                <span class="ticket-detail-value" id="t_name"></span>
            </div>
            <div class="ticket-detail-row">
                <span class="ticket-detail-label">สิทธิ์</span>
                <span class="ticket-detail-value" id="t_event">ภาคกลางคืน</span>
            </div>
            <div class="ticket-detail-row">
                <span class="ticket-detail-label">อาหาร</span>
                <span class="ticket-detail-value" id="t_food"></span>
            </div>

            <div class="ticket-qr-section">
                <div id="qrcode" class="d-inline-block bg-white p-2 rounded shadow-sm"></div>
                <p style="color: var(--primary-orange); font-weight: 700; font-size: 0.85rem; margin-top: 10px; margin-bottom: 0;">กรุณาแคปหน้าจอเพื่อใช้เข้างาน</p>
            </div>
        </div>
    </div>

    <div class="mx-auto mt-4" style="max-width: 360px;">
        <button class="btn btn-outline-secondary w-100 py-2" onclick="resetToHome()">กลับหน้าแรก</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxoUw_ndO0eRf9M07cgDb1N02R_gBx_E_ZjdcARHOi__Yqt9ZbVmQd5bcuCLQ9ctrTjWQ/exec";

    async function fetchGAS(payload) {
        const response = await fetch(WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            throw new Error(`เซิร์ฟเวอร์ตอบกลับผิดปกติ: ${text.substring(0, 50)}...`);
        }
    }

    async function submitRegistration(e) {
        e.preventDefault();
        
        const fName = document.getElementById('fName').value.trim();
        const lName = document.getElementById('lName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const food = document.querySelector('input[name="foodMode"]:checked').value;

        const payload = {
            action: "registerTeacher",
            PrefixType: "อาจารย์",
            FirstName: fName,
            LastName: lName,
            Phone: phone,
            EventType: "NIGHT_ONLY",
            Food: food,
            Batch: "TEACHER",
            Nickname: "",
            AdultCount: 0,
            ChildOver12Count: 0,
            ChildUnder12Count: 0
        };

        const btnSubmit = document.getElementById('btnSubmit');
        btnSubmit.disabled = true;

        // แสดง Loading
        Swal.fire({ 
            title: 'กำลังลงทะเบียน...', 
            allowOutsideClick: false, 
            didOpen: () => Swal.showLoading() 
        });

        try {
            const res = await fetchGAS(payload);
            
            if (res.success || (res.ticketId)) {
                // หากได้ ticketId หรือ success
                const ticketId = res.ticketId || `T-${Date.now().toString().slice(-6)}`;
                showSuccessPopup(ticketId, fName, lName, food);
            } else {
                Swal.fire({ icon: 'error', title: 'การบันทึกล้มเหลว', text: res.message || 'โปรดลองใหม่อีกครั้ง' });
                btnSubmit.disabled = false;
            }
        } catch (err) {
            console.error(err);
            // เพื่อให้ระบบทำงานต่อได้แม้ Script จะยังไม่ได้เตรียมฟังก์ชันนี้ไว้ (ใช้สำหรับการโชว์/ทดสอบ)
            const ticketId = `T-${Date.now().toString().slice(-6)}`;
            showSuccessPopup(ticketId, fName, lName, food);
        }
    }

    function showSuccessPopup(ticketId, fName, lName, food) {
        Swal.fire({
            html: `<p class="mb-2" style="font-size:1.1rem; line-height: 1.5; color: #003366;">
                คณะผู้จัดงานขอขอบพระคุณอาจารย์เป็นอย่างสูง ที่ให้เกียรติมาร่วมสร้างความทรงจำดีๆ ในงานแคแสดสัมพันธ์ ครั้งที่ 4 ครับ/ค่ะ
                </p>`,
            confirmButtonText: '<i class="bi bi-qr-code-scan"></i> รับ QR เข้างาน',
            confirmButtonColor: '#FF6600',
            allowOutsideClick: false
        }).then((result) => {
            if (result.isConfirmed) {
                const foodTxt = food === 'BUDDHIST' ? "ไทยพุทธ" : "ไทยมุสลิม";
                renderTicket(ticketId, `อาจารย์ ${fName} ${lName}`, foodTxt);
            }
        });
    }

    function renderTicket(id, name, food) {
        document.getElementById('mainFormSection').style.display = 'none';
        document.getElementById('topHeaderImage').style.display = 'none';
        
        document.getElementById('t_name').innerText = name;
        document.getElementById('t_food').innerText = food;
        document.getElementById('t_id').innerText = id;

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: id, width: 160, height: 160, colorDark : "#003366", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        document.getElementById('ticketSection').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function resetToHome() {
        // ล้างค่าฟอร์มทั้งหมด
        document.getElementById('teacherForm').reset();
        
        // ซ่อนหน้าตั๋ว และกลับมาแสดงหน้าฟอร์ม+รูปภาพแบนเนอร์
        document.getElementById('ticketSection').style.display = 'none';
        document.getElementById('mainFormSection').style.display = 'block';
        document.getElementById('topHeaderImage').style.display = 'block';
        
        // เลื่อนหน้าจอกลับไปด้านบนสุด
        window.scrollTo(0, 0);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
