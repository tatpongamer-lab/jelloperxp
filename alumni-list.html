<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบรายชื่อศิษย์เก่า | แคแสดสัมพันธ์ ครั้งที่ 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-orange: #FF6600;
            --primary-blue: #003366;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Sarabun', sans-serif;
        }
        .header-banner {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-banner img {
            width: 100%;
            border-radius: 0 0 25px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .alumni-card {
            background: #fff;
            border-radius: 10px;
            border-left: 4px solid var(--primary-orange);
            padding: 0;
            margin-bottom: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            display: flex;
            align-items: stretch;
            overflow: hidden;
        }
        .alumni-info {
            flex: 1;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .alumni-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin: 0;
        }
        .alumni-event {
            font-size: 0.8rem;
            color: var(--primary-orange);
            font-weight: 600;
            margin-top: 3px;
        }
        .alumni-nickname {
            font-size: 1.2rem;
            color: var(--primary-blue);
            font-weight: 700;
            background-color: #fff3e6;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-radius: 0 6px 6px 0;
        }
        .btn-primary {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }
        .btn-primary:hover {
            background-color: #002244;
            border-color: #002244;
        }
        .total-counter {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-orange);
            text-align: center;
            margin-bottom: 15px;
        }

    </style>
</head>
<body>

<div class="container pb-5" style="max-width: 400px;">
    <div class="header-banner">
        <img src="image/alumni-list.jpg" alt="แคแสดสัมพันธ์ ครั้งที่ 4">
    </div>

    <div class="text-center mb-4">
        <h4 style="color: var(--primary-blue); font-weight: bold;">ตรวจสอบรายชื่อศิษย์เก่า</h4>
    </div>

    <div class="card p-3 mb-4">
        <form id="filterForm" onsubmit="handleFilter(event)">
            <div class="mb-3">
                <label class="form-label" style="color: var(--primary-blue); font-weight: 600;">เลือกรุ่นที่ต้องการตรวจสอบ</label>
                <select class="form-select" id="Batch" required>
                    <option value="">-- เลือกรุ่น --</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" id="btnSearch">
                <i class="bi bi-search me-2"></i>ค้นหารายชื่อ
            </button>
        </form>
    </div>

    <div id="resultSection" style="display: none;">
        <div class="total-counter" id="totalCounter">พบรายชื่อทั้งหมด: 0 ท่าน</div>
        <div id="alumniListContainer">
            <!-- List will be rendered here -->

    </div>
    
    <!-- Footer Link -->
    <a href="https://www.facebook.com/KhaesadNST" target="_blank" style="
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 12px; 
        padding: 16px 0; 
        margin: 16px auto 0 auto; 
        text-decoration: none; 
        width: 100%; 
        max-width: 400px;
    ">
        <span style="color: var(--primary-orange); font-weight: 500; font-size: 1.2rem;">ติดต่อ :</span>
        <i class="bi bi-facebook" style="font-size: 1.3rem; color: var(--primary-blue);"></i> 
        <span style="color: var(--primary-blue); font-weight: 500; font-size: 1rem;">แคแสดสัมพันธ์ ครั้งที่ 4 ปี 2569</span>
    </a>

</div>

<script>
    // ⚠️ นำ URL Web App ของคุณมาใส่ตรงนี้ ⚠️
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxoUw_ndO0eRf9M07cgDb1N02R_gBx_E_ZjdcARHOi__Yqt9ZbVmQd5bcuCLQ9ctrTjWQ/exec";

    // 1. สร้าง Option รุ่น (เพิ่ม ม.ปลาย 1-3)
    window.onload = function() {
        var batchSelect = document.getElementById('Batch');
        
        // เพิ่ม ม.ปลาย รุ่น 1-3 เข้าไปก่อน
        for(var i=1; i<=3; i++) {
            var opt = document.createElement('option');
            opt.value = 'HS' + i;
            opt.innerHTML = 'ม.ปลาย รุ่น ' + i;
            batchSelect.appendChild(opt);
        }

        // เพิ่มรุ่น 1-30
        for(var i=1; i<=30; i++) {
            var opt = document.createElement('option');
            opt.value = i + '/' + (i+3);
            opt.innerHTML = 'ม.ต้น รุ่น ' + i + ' / ม.ปลาย รุ่น ' + (i+3);
            batchSelect.appendChild(opt);
        }
    };

    async function handleFilter(e) {
        e.preventDefault();
        const batch = document.getElementById('Batch').value;
        if (!batch) return;

        showLoading();
        
        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "getAlumniList",
                    batch: batch
                })
            });
            const res = await response.json();
            
            Swal.close();
            
            if (res.success) {
                renderList(res.data);
            } else {
                Swal.fire('เกิดข้อผิดพลาด', res.message || 'ไม่สามารถดึงข้อมูลได้', 'error');
            }
        } catch (err) {
            Swal.close();
            Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
        }
    }

    function renderList(data) {
        document.getElementById('resultSection').style.display = 'block';
        document.getElementById('totalCounter').innerText = 'พบรายชื่อทั้งหมด: ' + data.length + ' ท่าน';
        
        const container = document.getElementById('alumniListContainer');
        container.innerHTML = '';
        
        if (data.length === 0) {
            container.innerHTML = '<div class="text-center p-4 text-muted bg-white rounded-3 shadow-sm">'
                + '<i class="bi bi-inbox fs-1"></i>'
                + '<p class="mt-2 mb-0">ยังไม่มีรายชื่อผู้ที่ลงทะเบียนในรุ่นนี้</p>'
                + '</div>';
            return;
        }

        data.forEach(function(item) {
            var eventText = item.eventType === 'DAY_ONLY' ? 'เฉพาะกลางวัน' : 
                           (item.eventType === 'NIGHT_ONLY' ? 'เฉพาะกลางคืน' : 'กลางวันและกลางคืน');

            var card = document.createElement('div');
            card.className = 'alumni-card';
            card.innerHTML = '<div class="alumni-info">'
                + '<div class="alumni-name">' + escapeHtml(item.name) + '</div>'
                + '<div class="alumni-event">' + eventText + '</div>'
                + '</div>'
                + (item.nickname ? '<div class="alumni-nickname">' + escapeHtml(item.nickname) + '</div>' : '');
            container.appendChild(card);
        });
    }

    function escapeHtml(unsafe) {
        if (!unsafe) return "";
        return String(unsafe)
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    }

    function showLoading() {
        Swal.fire({ 
            title: 'กำลังค้นหารายชื่อ...', 
            allowOutsideClick: false, 
            didOpen: () => { Swal.showLoading() } 
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
