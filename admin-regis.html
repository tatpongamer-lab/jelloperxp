<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { 
            /* Friendly Dark Mode Colors */
            --bg-dark: #111827; 
            --bg-panel: #1f2937; 
            --bg-elevated: #374151;
            --border: #374151; 
            --text-main: #f3f4f6; 
            --text-muted: #9ca3af;
            --accent: #38bdf8; 
            --accent-hover: #0ea5e9;
            --border-radius: 12px;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Prompt', sans-serif; }
        .admin-header { background-color: var(--bg-panel); padding: 20px; border-bottom: 1px solid var(--border); text-align: center; }
        .card-custom { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--border-radius); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .form-control, .form-select { background-color: var(--bg-dark); border-color: var(--border); color: white; padding: 12px 15px; border-radius: 8px; transition: all 0.2s; }
        .form-control::placeholder { color: #6b7280; opacity: 1; }
        .form-control:focus, .form-select:focus { background-color: var(--bg-dark); color: white; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        .btn-primary { background-color: var(--accent); border: none; font-weight: bold; color: #000; border-radius: 8px; }
        .btn-primary:hover { background-color: var(--accent-hover); color: #000; }
        .nav-tabs { border-bottom: 1px solid var(--border); }
        .nav-link { color: var(--text-muted); transition: all 0.2s; border-radius: 8px 8px 0 0; }
        .nav-link:hover { color: var(--text-main); border-color: transparent transparent var(--border) transparent; }
        .nav-link.active { background-color: var(--bg-panel) !important; color: var(--accent) !important; border-color: var(--border) var(--border) var(--bg-panel) !important; font-weight: bold; }
        .ticket-box { background: white; color: #000; padding: 20px; border-radius: 12px; border: 4px solid var(--accent); }
        #authSection { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        #mainApp { display: none; }

        /* ================= ปุ่มกดแบบ Custom (Card Select) ================= */
        .btn-check-custom { display: none; }
        .btn-label-custom {
            border: 2px solid var(--border);
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease-in-out;
            flex: 1;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }
        .btn-label-custom:hover {
            border-color: #4b5563;
            background-color: rgba(255, 255, 255, 0.05);
        }
        /* สถานะตอนถูกกด (Active) */
        .btn-check-custom:checked + .btn-label-custom {
            background-color: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div id="authSection" class="container">
    <div class="card-custom text-center" style="max-width: 400px; width: 100%;">
        <h4 class="text-white mb-3">🔐 Admin Access</h4>
        <input type="password" id="pinInput" class="form-control text-center fs-4 mb-3" placeholder="Enter PIN" maxlength="6">
        <button class="btn btn-primary w-100 py-2" onclick="login()">เข้าสู่ระบบ</button>
    </div>
</div>

<div id="mainApp">
    <div class="admin-header mb-4">
        <h3 class="text-white m-0">Registration</h3>
    </div>

    <!-- บีบความกว้างเป็น 500px จัดให้อยู่ตรงกลาง -->
    <div class="container mx-auto" style="max-width: 500px;">
        <ul class="nav nav-tabs mb-4" id="myTab">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#newRegis">ออกบัตร</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#searchQR">ค้นหาบัตร</button></li>
        </ul>

        <div class="tab-content">
            <!-- ================= TAB 1: ออกตั๋วใหม่ ================= -->
            <div class="tab-pane fade show active" id="newRegis">
                <form id="vipForm" onsubmit="submitVIP(event)">
                    
                    <div class="card-custom">
                        <div class="d-flex gap-2">
                            <input type="radio" name="vipType" id="typeTeacher" value="TEACHER" class="btn-check-custom" checked onchange="toggleForm()">
                            <label class="btn-label-custom py-3" for="typeTeacher"><span class="fs-4"></span> อาจารย์</label>
                            
                            <input type="radio" name="vipType" id="typeSponsor" value="SPONSOR" class="btn-check-custom" onchange="toggleForm()">
                            <label class="btn-label-custom py-3" for="typeSponsor"><span class="fs-4"></span> สปอนเซอร์</label>
                        </div>
                    </div>

                    <div class="card-custom">
                        <div class="row g-3 mb-3">
                            <div class="col-6"><input type="text" id="fName" class="form-control" placeholder="ชื่อจริง (เว้นคำนำหน้า)" required></div>
                            <div class="col-6"><input type="text" id="lName" class="form-control" placeholder="นามสกุล" required></div>
                            <div class="col-12"><input type="tel" id="phone" class="form-control" placeholder="เบอร์โทรศัพท์ (10 หลัก)" pattern="0[0-9]{9}" required></div>
                        </div>
                        
                        <div id="sponsorFields" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label text-white small mb-1">ชื่อบริษัท / หน่วยงาน / ร้านค้า</label>
                                <input type="text" id="company" class="form-control" placeholder="กรอกชื่อบริษัท">
                            </div>
                        </div>

                        <!-- ปรับเป็นปุ่มกด Checkbox แบบเลือกได้ทั้งคู่ -->
                        <div class="mb-3">
                            <div class="d-flex gap-2">
                                <input type="checkbox" id="eventDay" class="btn-check-custom">
                                <label class="btn-label-custom" for="eventDay">งานกลางวัน</label>
                                
                                <input type="checkbox" id="eventNight" class="btn-check-custom">
                                <label class="btn-label-custom" for="eventNight">งานกลางคืน</label>
                            </div>
                        </div>

                        <!-- ปรับเป็นปุ่มกด Radio -->
                        <div class="mb-2">
                            <div class="d-flex gap-2">
                                <input type="radio" name="foodMode" id="foodBuddhist" value="BUDDHIST" class="btn-check-custom" checked>
                                <label class="btn-label-custom" for="foodBuddhist">ไทยพุทธ</label>
                                
                                <input type="radio" name="foodMode" id="foodHalal" value="HALAL" class="btn-check-custom">
                                <label class="btn-label-custom" for="foodHalal">ไทยมุสลิม</label>
                            </div>
                        </div>
                    </div>

                    <div class="card-custom" id="followerCard" style="display: none;">
                        <div class="row g-2 text-center">
                            <div class="col-4">
                                <label class="text-white small mb-1">ผู้ใหญ่</label>
                                <input type="number" id="fAdult" class="form-control text-center fs-5" value="0" min="0">
                            </div>
                            <div class="col-4">
                                <label class="text-white small mb-1">เด็ก ≥ 12 ปี</label>
                                <input type="number" id="fChildO12" class="form-control text-center fs-5" value="0" min="0">
                            </div>
                            <div class="col-4">
                                <label class="text-white small mb-1">เด็ก < 12 ปี</label>
                                <input type="number" id="fChildU12" class="form-control text-center fs-5" value="0" min="0">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fs-5 mb-5 shadow"> ออกบัตร </button>
                </form>
            </div>

            <!-- ================= TAB 2: ค้นหาตั๋ว ================= -->
            <div class="tab-pane fade" id="searchQR">
                <div class="card-custom">
                    <h5 class="text-white mb-3">ค้นหาบัตร</h5>
                    <form onsubmit="searchVIP(event)">
                        <input type="tel" id="sPhone" class="form-control mb-3" placeholder="เบอร์โทรศัพท์" required>
                        <input type="text" id="sName" class="form-control mb-3" placeholder="ชื่อจริง (เว้นคำนำหน้า)" required>
                        <button type="submit" class="btn btn-primary w-100 py-2">ค้นหา</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= ส่วนแสดงตั๋ว (E-Ticket) ================= -->
    <div class="container pb-5" id="ticketSection" style="display: none; text-align: center;">
        
        <div class="ticket-box mx-auto shadow-lg" id="ticketContent" style="max-width: 360px; padding: 25px; text-align: left;">
            <h3 class="text-center mb-1" style="color: #003366; font-weight: bold;">บัตรเข้างาน</h3>
            <h4 class="text-center text-muted mb-3" id="t_batch"></h4>
            <hr>
            
            <span id="t_id" style="display: none;"></span>
            
            <div class="mb-3" style="font-size: 0.95rem; line-height: 1.6;">
                <p class="mb-1"><b>ชื่อ:</b> <span id="t_name"></span></p>
                <p class="mb-1"><b>สิทธิ์:</b> <span id="t_event"></span></p>
                <p class="mb-1"><b>อาหาร:</b> <span id="t_food"></span></p>
                <p class="mb-0"><b>ผู้ติดตาม:</b> <span id="t_follower"></span></p>
            </div>
            
            <div class="text-center bg-light p-3 rounded mt-3 border border-2 border-dark">
                <div id="qrcode" class="d-inline-block"></div>
            </div>
        </div>

        <div class="mx-auto mt-3" style="max-width: 360px;">
            <button class="btn btn-success w-100 py-2 fw-bold shadow-sm" onclick="downloadTicket()">
                <i class="bi bi-download"></i> ดาวน์โหลด QR Code
            </button>
            <button class="btn btn-secondary w-100 mt-2 py-2" onclick="closeTicket()">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ นำ URL Web App มาใส่ตรงนี้
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwzYxbwKueYVTr-ZGqzU6pgieySxS08pX6NgTtPTtQsxYOqDsGuvQ0xgZYQHfCuVk116Q/exec";
    let ADMIN_PIN = "123456";

    function login() {
        const pin = document.getElementById('pinInput').value;
        if (pin === "123456") { 
            ADMIN_PIN = pin;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            Swal.fire({ icon: 'error', title: 'ปฏิเสธการเข้าถึง', text: 'PIN ไม่ถูกต้อง', background: '#161b22', color: 'white' });
        }
    }

    function toggleForm() {
        const type = document.querySelector('input[name="vipType"]:checked').value;
        if (type === "TEACHER") {
            document.getElementById('sponsorFields').style.display = 'none';
            document.getElementById('followerCard').style.display = 'none';
            document.getElementById('fAdult').value = 0;
            document.getElementById('fChildO12').value = 0;
            document.getElementById('fChildU12').value = 0;
            document.getElementById('company').value = "";
        } else {
            document.getElementById('sponsorFields').style.display = 'block';
            document.getElementById('followerCard').style.display = 'block';
        }
    }

    // --- 🛡️ ฟังก์ชันเชื่อมต่อ Server แบบกันกระสุน ---
    async function fetchGAS(payload) {
        const response = await fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            throw new Error(`เซิร์ฟเวอร์ตอบกลับผิดปกติ: ${text.substring(0, 50)}...`);
        }
    }

    // --- 📝 ฟังก์ชันออกตั๋ว VIP ---
    async function submitVIP(e) {
        e.preventDefault();
        const type = document.querySelector('input[name="vipType"]:checked').value;
        
        // 📌 ประมวลผลปุ่ม "สิทธิ์การเข้างาน"
        const isDay = document.getElementById('eventDay').checked;
        const isNight = document.getElementById('eventNight').checked;
        let eventMode = "";
        
        if (isDay && isNight) eventMode = "DAY_NIGHT";
        else if (isDay) eventMode = "DAY_ONLY";
        else if (isNight) eventMode = "NIGHT_ONLY";
        
        if (!eventMode) {
            Swal.fire({icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือกช่วงเวลางานอย่างน้อย 1 ช่วงเวลา', background: '#161b22', color: 'white'}); 
            return;
        }

        const payload = {
            action: "registerVIP",
            pin: ADMIN_PIN,
            PrefixType: type === "TEACHER" ? "อาจารย์" : "คุณ",
            FirstName: document.getElementById('fName').value.trim(),
            LastName: document.getElementById('lName').value.trim(),
            Phone: document.getElementById('phone').value.trim(),
            EventType: eventMode,
            Food: document.querySelector('input[name="foodMode"]:checked').value,
            Batch: type,
            Nickname: type === "TEACHER" ? "" : document.getElementById('company').value.trim(),
            AdultCount: document.getElementById('fAdult').value || 0,
            ChildOver12Count: document.getElementById('fChildO12').value || 0,
            ChildUnder12Count: document.getElementById('fChildU12').value || 0
        };

        if(type === "SPONSOR" && !payload.Nickname) {
            Swal.fire({icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกชื่อบริษัท/หน่วยงาน', background: '#161b22', color: 'white'}); return;
        }

        Swal.fire({ title: 'กำลังออกตั๋ว...', allowOutsideClick: false, background: '#161b22', color: 'white', didOpen: () => Swal.showLoading() });

        try {
            const res = await fetchGAS(payload);
            
            if (res.success) {
                Swal.close();
                document.getElementById('vipForm').reset();
                toggleForm();
                
                const eventTxt = payload.EventType === 'DAY_ONLY' ? "เฉพาะกลางวัน" : (payload.EventType === 'NIGHT_ONLY' ? "เฉพาะกลางคืน" : "กลางวันและกลางคืน");
                const foodTxt = payload.Food === 'BUDDHIST' ? "ไทยพุทธ" : "ไทยมุสลิม";
                const batchTxt = type === "TEACHER" ? "อาจารย์" : `สปอนเซอร์: ${payload.Nickname}`;
                
                renderTicket(res.ticketId, `${payload.PrefixType}${payload.FirstName} ${payload.LastName}`, batchTxt, eventTxt, foodTxt, `ผู้ใหญ่ ${payload.AdultCount}, เด็กโต ${payload.ChildOver12Count}, เด็กเล็ก ${payload.ChildUnder12Count}`);
            } else {
                Swal.fire({ icon: 'error', title: 'การบันทึกล้มเหลว', text: res.message, background: '#161b22', color: 'white' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'การเชื่อมต่อผิดพลาด', text: err.message, background: '#161b22', color: 'white' });
        }
    }

    // --- 🔍 ฟังก์ชันค้นหาตั๋ว ---
    async function searchVIP(e) {
        e.preventDefault();
        Swal.fire({ title: 'กำลังค้นหา...', allowOutsideClick: false, background: '#161b22', color: 'white', didOpen: () => Swal.showLoading() });
        
        try {
            const res = await fetchGAS({ 
                action: "search", 
                Phone: document.getElementById('sPhone').value.trim(), 
                FirstName: document.getElementById('sName').value.trim(),
                mode: "VIP" 
            });
            
            if (res.success && res.ticketId) {
                Swal.close();
                const eventTxt = res.eventType === 'DAY_ONLY' ? "เฉพาะกลางวัน" : (res.eventType === 'NIGHT_ONLY' ? "เฉพาะกลางคืน" : "กลางวันและกลางคืน");
                const foodTxt = res.food === 'BUDDHIST' ? "ไทยพุทธ" : (res.food === 'HALAL' ? "ไทยมุสลิม" : (res.food || "-"));
                
                let batchTxt = res.batch;
                if(res.batch === "TEACHER") batchTxt = "อาจารย์";
                else if(res.batch === "SPONSOR") batchTxt = "สปอนเซอร์"; 

                renderTicket(res.ticketId, res.name, batchTxt, eventTxt, foodTxt, `ผู้ใหญ่ ${res.adult}, เด็กโต ${res.childO12}, เด็กเล็ก ${res.childU12}`);
            } else {
                Swal.fire({ icon: 'warning', title: 'ไม่พบข้อมูล', text: res.message, background: '#161b22', color: 'white' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'การเชื่อมต่อผิดพลาด', text: err.message, background: '#161b22', color: 'white' });
        }
    }

    // --- 🎟️ แสดงผลบัตร ---
    function renderTicket(id, name, batch, event, food, follower) {
        document.getElementById('t_name').innerText = name;
        document.getElementById('t_batch').innerText = `(${batch})`;
        document.getElementById('t_event').innerText = event;
        document.getElementById('t_food').innerText = food;
        document.getElementById('t_follower').innerText = follower;
        document.getElementById('t_id').innerText = id;

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: id, width: 160, height: 160, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        document.getElementById('ticketSection').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function closeTicket() {
        document.getElementById('ticketSection').style.display = 'none';
        window.scrollTo(0, 0);
    }

    // --- 💾 แคปรูปบัตร ---
    function downloadTicket() {
        const qrcodeDiv = document.getElementById('qrcode');
        const qrCanvas = qrcodeDiv.querySelector('canvas');
        
        if (qrCanvas) {
            const img = document.createElement('img');
            img.src = qrCanvas.toDataURL('image/png');
            img.style.width = "160px"; 
            img.style.height = "160px";
            qrcodeDiv.innerHTML = ''; 
            qrcodeDiv.appendChild(img); 
        }

        setTimeout(() => {
            const node = document.getElementById('ticketContent');
            html2canvas(node, { 
                scale: 2, 
                useCORS: true, 
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `VIP_Ticket_${document.getElementById('t_id').innerText}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }, 200);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
